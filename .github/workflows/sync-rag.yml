name: Sync RAG on Deploy

on:
  deployment_status:
  workflow_dispatch:

jobs:
  sync:
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production')
    environment: production
    runs-on: ubuntu-latest
    env:
      RAG_SYNC_URL: ${{ secrets.RAG_SYNC_URL }}
      SYNC_SECRET: ${{ secrets.SYNC_SECRET }}
    steps:
      - name: Start sync
        id: start
        run: |
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" -X POST "$RAG_SYNC_URL" \
            -H "Authorization: Bearer $SYNC_SECRET")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          echo "Status: $HTTP_STATUS"
          echo "Body: $BODY"
          if [ "$HTTP_STATUS" != "202" ]; then
            echo "Sync request failed with status $HTTP_STATUS"
            exit 1
          fi
          JOB_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "job_id=$JOB_ID" >> $GITHUB_OUTPUT

      - name: Stream logs
        run: |
          curl -s -N "$RAG_SYNC_URL?job_id=${{ steps.start.outputs.job_id }}" \
            -H "Authorization: Bearer $SYNC_SECRET" | \
          while IFS= read -r line; do
            echo "${line#data: }"
            [[ "$line" == "data: [done]" ]] && break
          done
